<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AAPM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }

        :root {
            --accent: #6366f1;
            --bg-dark: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Aura pulsante de fundo */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 10s ease-in-out infinite;
            z-index: 0;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-bottom: 8px;
            margin-left: 4px;
            font-weight: 600;
        }

        /* Container para alinhar o ícone fixo dentro do input */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #64748b;
            pointer-events: none;
            transition: color 0.3s ease;
            width: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 45px; /* Espaço para o ícone na esquerda */
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Muda a cor do ícone quando o input está focado */
        input:focus + i {
            color: var(--accent);
        }

        .alert-box {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #bbf7d0;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #020617;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="header">
            <h1>Entrar</h1>
            <p class="subtitle">Acesse sua conta no sistema AAPM</p>
        </div>

        {% if erro %}
            <div class="alert-box error">
                <i data-lucide="alert-circle" style="width:16px"></i>
                {{erro}}
            </div>
        {% endif %}

        {% if request.query_params.get("cadastro") == "success" %}
            <div class="alert-box success">
                <i data-lucide="check-circle" style="width:16px"></i>
                Cadastro realizado! Faça login.
            </div>
        {% endif %}
        
        <form action="/auth/login" method="post">
            <div class="input-group">
                <label for="email">E-mail corporativo</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="senha">Senha de acesso</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit">
                Entrar 
                <i data-lucide="arrow-right" style="width:18px"></i>
            </button>
        </form>

        <div class="footer">
            Não tem conta? <a href="/auth/cadastro">Criar conta</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
