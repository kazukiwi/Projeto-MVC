<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AAPM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        :root {
            --accent: #6366f1;
            --accent-hover: rgba(99, 102, 241, 0.15);
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.65);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex; /* Divide a tela entre Sidebar e Conteúdo */
            color: white;
            overflow: hidden;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px 16px;
            box-sizing: border-box;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 12px;
            margin-bottom: 40px;
        }

        .brand-logo {
            background: var(--accent);
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .brand span {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background: var(--accent-hover);
        }

        .nav-link.active {
            border-left: 3px solid var(--accent);
            border-radius: 4px 12px 12px 4px;
            padding-left: 13px;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        /* ÁREA DE CONTEÚDO PRINCIPAL */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-y: auto;
        }

        /* Card do Usuário (Centralizado na Área Principal) */
        .dashboard-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent) 0%, #4338ca 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .avatar i {
            width: 28px;
            height: 28px;
            color: white;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.2);
            width: max-content;
        }

        .content-body p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        .dashboard-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Responsividade para celulares */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 16px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .brand { margin-bottom: 20px; }
            .menu-nav { flex-direction: row; flex-wrap: wrap; }
            .sidebar-footer { display: none; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="brand">
                <div class="brand-logo">
                    <i data-lucide="boxes" style="width:22px; height:22px;"></i>
                </div>
                <span>AAPM Estoque</span>
            </div>

            <nav class="menu-nav">
                <a href="#dashboard" class="nav-link active">
                    <i data-lucide="layout-dashboard"></i> Início
                </a>
                <a href="#produtos" class="nav-link">
                    <i data-lucide="package"></i> Produtos
                </a>
                <a href="#movimentacoes" class="nav-link">
                    <i data-lucide="arrow-left-right"></i> Movimentações
                </a>
                <a href="#relatorios" class="nav-link">
                    <i data-lucide="bar-chart-3"></i> Relatórios
                </a>
                <a href="#configuracoes" class="nav-link">
                    <i data-lucide="settings"></i> Configurações
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <a href="/auth/logout" class="logout-btn">
                <i data-lucide="log-out"></i> Sair do Sistema
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="dashboard-card">
            <div class="user-profile">
                <div class="avatar">
                    <i data-lucide="user"></i>
                </div>
                <div class="user-info">
                    <h1>Olá, {{usuario.nome}}</h1>
                    <div class="role-tag">
                        <i data-lucide="shield" style="width: 14px; height: 14px;"></i>
                        {{usuario.role}}
                    </div>
                </div>
            </div>

            <div class="content-body">
                <p>Bem-vindo ao seu painel. Utilize a barra lateral para navegar entre o inventário de produtos, relatórios de balanço e o histórico de movimentações da unidade.</p>
            </div>
        </div>
    </main>

    <script>
        // Inicializa todos os belos ícones do painel
        lucide.createIcons();
    </script>
</body>
</html>
