<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Editar" if editando else "Novo" }} Usuário — Estoque</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }

        :root {
            --accent: #6366f1;
            --accent-hover: rgba(99, 102, 241, 0.15);
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Aura pulsante de fundo */
        .main-content::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 10s ease-in-out infinite;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px 16px;
            box-sizing: border-box;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 12px;
            margin-bottom: 40px;
        }

        .brand-logo {
            background: var(--accent);
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .brand span {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background: var(--accent-hover);
        }

        .nav-link.active {
            border-left: 3px solid var(--accent);
            border-radius: 4px 12px 12px 4px;
            padding-left: 13px;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-bottom: 8px;
            margin-left: 4px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #64748b;
            pointer-events: none;
            transition: color 0.3s ease;
            width: 18px;
            height: 18px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px 14px 45px; /* Espaço para o ícone */
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Ajuste específico para o select estilizado no tema dark */
        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            cursor: pointer;
        }

        select option {
            background: #0f172a;
            color: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input:focus + i, select:focus + i {
            color: var(--accent);
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #020617;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            background: #f8fafc;
        }

        .btn-cancel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px;
            font-size: 0.95rem;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            border-radius: 14px;
            border: 1px solid transparent;
        }

        .btn-cancel:hover {
            color: white;
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .menu-nav { flex-direction: row; flex-wrap: wrap; }
            .main-content { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="brand">
                <div class="brand-logo">
                    <i data-lucide="boxes" style="width:22px; height:22px;"></i>
                </div>
                <span>AAPM Estoque</span>
            </div>

            <nav class="menu-nav">
                <a href="/" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> Início
                </a>
                <a href="/usuarios" class="nav-link active">
                    <i data-lucide="users"></i> Usuários
                </a>
                <a href="#produtos" class="nav-link">
                    <i data-lucide="package"></i> Produtos
                </a>
                <a href="#movimentacoes" class="nav-link">
                    <i data-lucide="arrow-left-right"></i> Movimentações
                </a>
                <a href="#configuracoes" class="nav-link">
                    <i data-lucide="settings"></i> Configurações
                </a>
            </nav>
        </div>

        <div>
            <a href="/auth/logout" class="logout-btn">
                <i data-lucide="log-out"></i> Sair do Sistema
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="glass-card">
            <div class="header">
                <h1>{{ "Editar Usuário" if editando else "Novo Usuário" }}</h1>
                <p class="subtitle">
                    {{ "Atualize as informações do perfil selecionado" if editando else "Cadastre novas credenciais de acesso" }}
                </p>
            </div>

            {% if erro %}
                <div class="alert-box">
                    <i data-lucide="alert-circle" style="width:16px"></i>
                    {{ erro }}
                </div>
            {% endif %}

            <form action="{{ '/usuarios/' + editando.id|string + '/editar' if editando else '/usuarios/novo' }}" method="post">
                
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <div class="input-wrapper">
                        <input type="text" 
                               id="nome" 
                               name="nome" 
                               placeholder="Ex: João Silva" 
                               value="{{ editando.nome if editando else (valores.nome if valores else '') }}" 
                               required>
                        <i data-lucide="user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">E-mail corporativo</label>
                    <div class="input-wrapper">
                        <input type="email" 
                               id="email" 
                               name="email" 
                               placeholder="seu@email.com" 
                               value="{{ editando.email if editando else (valores.email if valores else '') }}" 
                               required>
                        <i data-lucide="mail"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha de acesso</label>
                    <div class="input-wrapper">
                        <input type="password" 
                               id="senha" 
                               name="senha" 
                               {{ "placeholder='Deixe vazio para não alterar'" if editando else "placeholder='Mínimo 6 caracteres' required minlength='6'" }}>
                        <i data-lucide="key-round"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="role">Perfil de acesso</label>
                    <div class="input-wrapper">
                        <select id="role" name="role">
                            <option value="operador" 
                                {{ 'selected' if (editando and editando.role == 'operador') or (valores and valores.role == 'operador') else '' }}>
                                Operador
                            </option>
                            <option value="admin" 
                                {{ 'selected' if (editando and editando.role == 'admin') or (valores and valores.role == 'admin') else '' }}>
                                Administrador
                            </option>
                        </select>
                        <i data-lucide="shield"></i>
                    </div>
                </div>

                <div class="actions-group">
                    <button type="submit">
                        {{ "Salvar alterações" if editando else "Criar usuário" }}
                        <i data-lucide="check" style="width:18px"></i>
                    </button>
                    
                    <a href="/usuarios" class="btn-cancel">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
